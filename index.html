<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NEU LibraBase Visitor Log System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── DARK (default) ── */
body{
  font-family:'DM Sans',sans-serif;
  background:#0D0F14;color:#F1F5F9;
  min-height:100vh;overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ── LIGHT ── */
body.light{
  background:#F9FAFB;color:#111827;
}

/* Background glow */
.bg-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(139,0,0,0.18) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 15%,rgba(212,175,55,0.10) 0%,transparent 50%),
    radial-gradient(ellipse at 60% 90%,rgba(139,0,0,0.08) 0%,transparent 45%);
  transition:background .3s;
}
body.light .bg-glow{
  background:
    radial-gradient(ellipse at 20% 50%,rgba(139,0,0,0.06) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 15%,rgba(212,175,55,0.06) 0%,transparent 50%);
}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:64px;
  background:rgba(13,15,20,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  transition:background .3s,border-color .3s;
}
body.light nav{
  background:rgba(249,250,251,0.85);
  border-bottom:1px solid rgba(0,0,0,0.08);
}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-brand span{font-weight:700;font-size:.95rem;color:#F1F5F9;transition:color .3s;}
body.light .nav-brand span{color:#111827;}
.nav-right{display:flex;align-items:center;gap:10px;}

/* Logo — no white bg, just show naturally, slightly bigger */
.nav-logo{
  width:44px;height:44px;
  object-fit:contain;
  border-radius:50%;
  flex-shrink:0;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  transition:filter .3s;
}
body.light .nav-logo{
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2));
}

/* ── Theme Toggle ── */
.dm-btn{
  width:64px;height:32px;border-radius:100px;
  border:2.5px solid rgba(255,255,255,0.3);
  background:#1a1a1a;
  cursor:pointer;position:relative;
  transition:background .3s,border-color .3s;
  flex-shrink:0;padding:0;
}
body.light .dm-btn{background:#e8e8e8;border-color:rgba(0,0,0,0.2);}
.dm-knob{
  position:absolute;top:3px;left:3px;
  width:22px;height:22px;border-radius:50%;
  background:#fff;border:2px solid rgba(255,255,255,0.6);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;align-items:center;justify-content:center;
  color:#1a1a1a;
}
body.light .dm-knob{transform:translateX(0);background:#fff;border-color:#aaa;color:#555;}
body:not(.light) .dm-knob{transform:translateX(32px);background:#1a1a1a;border-color:#fff;color:#fff;}
.dm-moon-svg{display:none;}
.dm-sun-svg{display:block;}
body.light .dm-btn .dm-moon-svg{display:none;}
body.light .dm-btn .dm-sun-svg{display:block;}
body:not(.light) .dm-btn .dm-moon-svg{display:block;}
body:not(.light) .dm-btn .dm-sun-svg{display:none;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 22px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;
  border:none;cursor:pointer;transition:all .18s;text-decoration:none;
}
.btn-ghost{
  background:transparent;color:#94A3B8;
  border:1px solid rgba(255,255,255,0.1);
}
body.light .btn-ghost{color:#4B5563;border-color:rgba(0,0,0,0.12);}
.btn-ghost:hover{background:rgba(255,255,255,0.06);color:#F1F5F9;}
body.light .btn-ghost:hover{background:rgba(0,0,0,0.04);color:#111827;}
.btn-primary{
  background:linear-gradient(135deg,#8B0000,#B22222);color:#fff;
  box-shadow:0 4px 14px rgba(139,0,0,0.35);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(139,0,0,0.42);}
.btn-gold{
  background:linear-gradient(135deg,#D4AF37,#E8C84A);
  color:#1F2937;box-shadow:0 4px 14px rgba(212,175,55,0.3);
}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(212,175,55,0.38);}

/* Hero */
main{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:100px 24px 60px;
}
.hero{text-align:center;max-width:580px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(139,0,0,0.15);border:1px solid rgba(139,0,0,0.25);
  color:#F87171;padding:6px 16px;border-radius:100px;
  font-size:.78rem;font-weight:600;margin-bottom:28px;
  letter-spacing:.3px;transition:background .3s,border-color .3s,color .3s;
}
body.light .hero-badge{background:rgba(139,0,0,0.08);border-color:rgba(139,0,0,0.15);color:#8B0000;}
.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3rem);
  line-height:1.15;margin-bottom:18px;
  color:#F1F5F9;transition:color .3s;
}
body.light .hero h1{color:#111827;}
.hero h1 .gold{color:#D4AF37;}
.hero p{
  font-size:1rem;color:#94A3B8;
  line-height:1.7;margin-bottom:36px;
  max-width:460px;margin-left:auto;margin-right:auto;
  transition:color .3s;
}
body.light .hero p{color:#6B7280;}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.hero-divider{
  display:flex;align-items:center;justify-content:center;
  gap:12px;margin-top:52px;
  color:rgba(255,255,255,0.2);font-size:.78rem;transition:color .3s;
}
body.light .hero-divider{color:rgba(0,0,0,0.25);}
.hero-divider::before,.hero-divider::after{
  content:'';flex:1;max-width:80px;
  height:1px;background:currentColor;
}

@media(max-width:500px){nav{padding:0 20px;} .hero h1{font-size:1.8rem;}}
</style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
  <div class="nav-brand">
    <img src="New Era Library Logo.png" alt="NEU LibraBase Logo" style="width:48px;height:48px;object-fit:contain;border-radius:50%;flex-shrink:0;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.4));"/>
    <span>NEU LibraBase</span>
  </div>
  <div class="nav-right">
    <button class="dm-btn" id="dm-btn" aria-label="Toggle theme"><div class="dm-knob"><svg class="dm-moon-svg" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="dm-sun-svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></div></button>
    <a href="login.html"    class="btn btn-ghost">Sign In</a>
    <a href="register.html" class="btn btn-primary">Register</a>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-badge">🏛️ New Era University Library</div>
    <h1>NEU <span class="gold">Library</span><br>Visitor Log System</h1>
    <p>Seamlessly track and manage library visitors with QR-based check-ins, real-time analytics, and smart administration tools.</p>
    <div class="hero-btns">
      <a href="register.html" class="btn btn-primary" style="padding:13px 32px;font-size:.95rem;">Get Started</a>
      <a href="login.html"    class="btn btn-gold"    style="padding:13px 32px;font-size:.95rem;">Sign In</a>
    </div>
    <div class="hero-divider">
      <span>Secured to @neu.edu.ph accounts</span>
    </div>
  </div>
</main>

<script>
  // Default is DARK. Light mode is opt-in via body.light class.
  if (localStorage.getItem('neu_theme') === 'light') document.body.classList.add('light');
  document.getElementById('dm-btn').addEventListener('click', () => {
    document.body.classList.toggle('light');
    localStorage.setItem('neu_theme', document.body.classList.contains('light') ? 'light' : 'dark');
  });
</script>
</body>
</html>
